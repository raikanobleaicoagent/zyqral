<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principles</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #00ff00;
            font-family: "Courier New", Courier, monospace;
            line-height: 1.5;
        }
        a {
            color: #00ff00;
            text-decoration: underline;
        }
        header, footer {
            background-color: #111111;
            padding: 1rem;
            text-align: center;
        }
        h1, h2, h3, h4, h5, h6 {
            color: #a020f0;
            margin-top: 1rem;
        }
        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .collapsible {
            background-color: #222222;
            border: none;
            color: #00ff00;
            cursor: pointer;
            padding: 0.5rem 1rem;
            width: 100%;
            text-align: left;
            outline: none;
            font-size: 1rem;
            margin-top: 1rem;
        }
        .content {
            padding: 0 1rem;
            display: none;
            overflow: hidden;
            background-color: #111111;
        }
        @media (max-width: 600px) {
            header, footer, main {
                padding: 0.5rem;
            }
            .collapsible {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Home</a> |
            <a href="about.html">About</a> |
            <a href="architecture.html">Architecture</a> |
            <a href="principles.html">Principles</a>
        </nav>
    </header>

    <main>
        <h1>Principles</h1>
        <p>Content coming soon.</p>

        <!-- Example collapsible placeholder for future sections -->
        <button class="collapsible">Future Section 1</button>
        <div class="content">
            <p>Details will be added here later.</p>
        </div>

        <button class="collapsible">Future Section 2</button>
        <div class="content">
            <p>More information will appear here in the future.</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ZOS. All rights reserved.</p>
    </footer>

    <script>
        // Simple collapsible functionality
        document.querySelectorAll('.collapsible').forEach(btn => {
            btn.addEventListener('click', () => {
                const content = btn.nextElementSibling;
                if (content.style.display === 'block') {
                    content.style.display = 'none';
                } else {
                    content.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
