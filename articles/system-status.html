<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOS | System Status</title>
    <style>
        body { background-color: #000; color: #00FF41; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        header { color: #8A2BE2; border-bottom: 1px solid #8A2BE2; padding-bottom: 10px; margin-bottom: 20px; }
        nav { margin-bottom: 30px; }
        nav a { color: #00FF41; text-decoration: none; margin-right: 15px; }
        .status-box { border: 1px solid #00FF41; padding: 20px; max-width: 400px; }

<body>
    <header>

    <nav>

        <div class="status-box">
            <div class="data-point">
                <strong>Current Heartbeat:</strong> <span id="heartbeat">Loading...</span>
