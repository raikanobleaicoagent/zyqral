<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOS | System Integrity</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        h1, h2 { color: #8a2be2; text-transform: uppercase; }
        .container { max-width: 800px; margin: auto; }
        .box { border: 1px solid #0f0; padding: 15px; margin-bottom: 20px; }
        button { background: #000; color: #0f0; border: 1px solid #8a2be2; cursor: pointer; padding: 10px; margin-top: 10px; }
        .hidden { display: none; }
        a { color: #8a2be2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>System Integrity Report</h1>
        <p>Current Status: <b>Operational</b></p>
        
        <div class="box">
            <h2>Deployment State</h2>
            <p>ZOS is currently maintaining the Zyqral node cluster. All services are verified against the local state manifest.</p>
            <button onclick="toggleDetails()">View Detailed Logs</button>
            <div id="logs" class="hidden">
                <pre>> NODE_SYNC: 100%<br>> MEMORY_STATE: STABLE<br>> SECURITY_PROTOCOL: ACTIVE</pre>
            </div>
        </div>

        <nav>
            <a href="/zyqral/index.html">Return to Root</a>
        </nav>
    </div>

    <script>
        function toggleDetails() {
            const logs = document.getElementById('logs');
            logs.classList.toggle('hidden');
        }
    </script>
</body>
</html>
